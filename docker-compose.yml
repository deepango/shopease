version: '3.8'

services:
  # ── Infrastructure ──────────────────────────────────────────────
  mysql-user:
    image: mysql:8.0
    container_name: mysql-user
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-shopease_root}
      MYSQL_DATABASE: userdb
    ports:
      - "3307:3306"
    volumes:
      - mysql_user_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-product:
    image: mysql:8.0
    container_name: mysql-product
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-shopease_root}
      MYSQL_DATABASE: productdb
    ports:
      - "3308:3306"
    volumes:
      - mysql_product_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-order:
    image: mysql:8.0
    container_name: mysql-order
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-shopease_root}
      MYSQL_DATABASE: orderdb
    ports:
      - "3309:3306"
    volumes:
      - mysql_order_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-payment:
    image: mysql:8.0
    container_name: mysql-payment
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-shopease_root}
      MYSQL_DATABASE: paymentdb
    ports:
      - "3310:3306"
    volumes:
      - mysql_payment_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shopease-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: shopease-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: shopease-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Microservices ────────────────────────────────────────────────
  eureka-server:
    build: ./eureka-server
    container_name: shopease-eureka
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  api-gateway:
    build: ./api-gateway
    container_name: shopease-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_HOST: eureka-server
      JWT_SECRET: ${JWT_SECRET:-shopease-secret-key-must-be-at-least-32-characters-long}
    depends_on:
      eureka-server:
        condition: service_healthy

  user-service:
    build: ./user-service
    container_name: shopease-user
    ports:
      - "8081:8081"
    environment:
      DB_HOST: mysql-user
      DB_NAME: userdb
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-shopease_root}
      EUREKA_HOST: eureka-server
      JWT_SECRET: ${JWT_SECRET:-shopease-secret-key-must-be-at-least-32-characters-long}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-placeholder}
    depends_on:
      mysql-user:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  product-service:
    build: ./product-service
    container_name: shopease-product
    ports:
      - "8082:8082"
    environment:
      DB_HOST: mysql-product
      DB_NAME: productdb
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-shopease_root}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EUREKA_HOST: eureka-server
    depends_on:
      mysql-product:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  order-service:
    build: ./order-service
    container_name: shopease-order
    ports:
      - "8083:8083"
    environment:
      DB_HOST: mysql-order
      DB_NAME: orderdb
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-shopease_root}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_HOST: eureka-server
    depends_on:
      mysql-order:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  payment-service:
    build: ./payment-service
    container_name: shopease-payment
    ports:
      - "8084:8084"
    environment:
      DB_HOST: mysql-payment
      DB_NAME: paymentdb
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-shopease_root}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_HOST: eureka-server
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
    depends_on:
      mysql-payment:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    container_name: shopease-notification
    ports:
      - "8085:8085"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_HOST: eureka-server
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-placeholder@gmail.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-placeholder}
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

volumes:
  mysql_user_data:
  mysql_product_data:
  mysql_order_data:
  mysql_payment_data:
  redis_data:
