apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: shopease
  labels:
    app: product-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: shopease/product-service:latest
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: shopease-config
          env:
            - name: DB_HOST
              value: "mysql-product"
            - name: DB_NAME
              value: "productdb"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopease-secrets
                  key: db-password
            - name: REDIS_HOST
              value: "redis"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 45
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: shopease
spec:
  selector:
    app: product-service
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product-service-hpa
  namespace: shopease
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: product-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
