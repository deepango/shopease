apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: shopease
  labels:
    app: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: shopease/payment-service:latest
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: shopease-config
          env:
            - name: DB_HOST
              value: "mysql-payment"
            - name: DB_NAME
              value: "paymentdb"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopease-secrets
                  key: db-password
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: shopease-secrets
                  key: stripe-secret-key
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: shopease-secrets
                  key: stripe-webhook-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 45
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: shopease
spec:
  selector:
    app: payment-service
  ports:
    - port: 8084
      targetPort: 8084
  type: ClusterIP
